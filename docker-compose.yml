services:
  nmap-ai:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./results:/app/results
      - ./config:/app/config
    environment:
      - PYTHONUNBUFFERED=1
      - DEBUG=true
    networks:
      - nmap-ai-network

  nmap-ai-prod:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - "8081:8080"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./results:/app/results
    environment:
      - PYTHONUNBUFFERED=1
      - DEBUG=false
    networks:
      - nmap-ai-network
    profiles:
      - production

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - nmap-ai-network
    profiles:
      - full

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: nmap_ai
      POSTGRES_USER: nmap_ai
      POSTGRES_PASSWORD: nmap_ai_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nmap-ai-network
    profiles:
      - full

volumes:
  redis_data:
  postgres_data:

networks:
  nmap-ai-network:
    driver: bridge